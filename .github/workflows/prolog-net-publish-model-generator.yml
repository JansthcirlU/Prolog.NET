name: prolog-net-publish-model-generator

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check for changes since last publish
        id: changes
        run: |
          CSPROJ="src/Prolog.NET.Model.Generator/Prolog.NET.Model.Generator.csproj"
          README="src/Prolog.NET.Model.Generator/README.md"
          LAST_TAG=$(git tag --list 'generator/v*' --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            echo "No previous publish tag — treating as first publish."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            DIFF=$(git diff --name-only "$LAST_TAG" HEAD -- "$CSPROJ" "$README")
            if [ -z "$DIFF" ]; then
              echo "No changes since $LAST_TAG."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Changed files since $LAST_TAG:"
              echo "$DIFF"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Skip — no relevant changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "::notice::No changes to .csproj or README.md since last publish tag. Skipping."

      - name: Pack
        if: steps.changes.outputs.changed == 'true'
        run: dotnet pack src/Prolog.NET.Model.Generator/Prolog.NET.Model.Generator.csproj -c Release -o ./nupkgs

      - name: NuGet login (OIDC → temp API key)
        if: steps.changes.outputs.changed == 'true'
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        if: steps.changes.outputs.changed == 'true'
        run: |
          dotnet nuget push ./nupkgs/Prolog.NET.Model.Generator.*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Tag published version
        if: steps.changes.outputs.changed == 'true'
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/Prolog.NET.Model.Generator/Prolog.NET.Model.Generator.csproj | tr -d '[:space:]')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git tag "generator/v$VERSION"
          git push origin "generator/v$VERSION"
